name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build:
    name: PHP ${{ matrix.php }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        php: ["8.2", "8.3", "8.4"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: none
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── SDL3 dependency ──────────────────────────────────────────────────────
      - name: Install SDL3 (macOS)
        if: runner.os == 'macOS'
        run: brew install sdl3

      - name: Install SDL3 (Linux)
        if: runner.os == 'Linux'
        id: sdl
        uses: libsdl-org/setup-sdl@main
        with:
          version: 3-latest
          build-type: Release
          install-linux-dependencies: true
          add-to-environment: true

      - name: Expose SDL3 to pkg-config (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "PKG_CONFIG_PATH=${{ steps.sdl.outputs.prefix }}/lib/pkgconfig:${PKG_CONFIG_PATH}" >> "$GITHUB_ENV"

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build extension
        working-directory: ext
        run: |
          phpize
          ./configure --enable-sdl3
          make -j$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)

      # ── Smoke test ───────────────────────────────────────────────────────────
      - name: Smoke-test
        run: |
          php \
            -d extension=ext/modules/sdl3.so \
            examples/proof_of_work.php
