name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build:
    name: PHP ${{ matrix.php }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        php: ["8.2", "8.3", "8.4"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: none
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── SDL3 dependency ──────────────────────────────────────────────────────
      - name: Install SDL3 (macOS)
        if: runner.os == 'macOS'
        run: brew install sdl3

      - name: Install SDL3 (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          # Try the distro package first; fall back to building from source if < 3.4.0
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libsdl3-dev pkg-config || true

          SDL3_VERSION=$(pkg-config --modversion sdl3 2>/dev/null || echo "0.0.0")
          REQUIRED="3.4.0"

          version_lt() {
            [ "$(printf '%s\n' "$1" "$2" | sort -V | head -n1)" = "$1" ] && [ "$1" != "$2" ]
          }

          if version_lt "$SDL3_VERSION" "$REQUIRED"; then
            echo "apt SDL3 version ($SDL3_VERSION) is older than $REQUIRED — building from source"
            sudo apt-get install -y --no-install-recommends \
              cmake build-essential git libgl-dev libasound2-dev \
              libpulse-dev libx11-dev libxext-dev libwayland-dev \
              libxkbcommon-dev libdbus-1-dev

            git clone --depth 1 --branch release-3.4.x \
              https://github.com/libsdl-org/SDL.git /tmp/SDL3
            cmake -S /tmp/SDL3 -B /tmp/SDL3/build \
              -DCMAKE_BUILD_TYPE=Release \
              -DSDL_SHARED=ON \
              -DSDL_STATIC=OFF \
              -DCMAKE_INSTALL_PREFIX=/usr/local
            cmake --build /tmp/SDL3/build -j$(nproc)
            sudo cmake --install /tmp/SDL3/build
            sudo ldconfig
          fi

          echo "PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:${PKG_CONFIG_PATH}" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=/usr/local/lib:${LD_LIBRARY_PATH}" >> "$GITHUB_ENV"

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build extension
        working-directory: ext
        run: |
          phpize
          ./configure --enable-sdl3
          make -j$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)

      # ── Smoke test ───────────────────────────────────────────────────────────
      - name: Smoke-test
        run: |
          php \
            -d extension=ext/modules/sdl3.so \
            examples/proof_of_work.php
